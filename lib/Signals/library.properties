sentence=ESP32-Bibliothek zum Senden von Steuerbefehlen an einen ATtiny-Empfaenger fuer NeoPixel und Speaker.
paragraph=Signals kapselt das ASCII-Protokoll und sendet Befehle ueber HardwareSerial (nur TX) an einen ATtiny412, der NeoPixel-LEDs und einen Speaker (PWM) steuert. Damit lassen sich LEDs einzeln oder global setzen sowie Toene mit Frequenz, Lautstaerke (0..50) und optionaler Dauer ausgeben.
category=Signal Input/Output
