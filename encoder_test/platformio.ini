; Eigenständiges Mini-Projekt (nur Encoder) — im Ordner encoder_test ausführen:
;   cd encoder_test
;   pio run -t upload
;   pio device monitor

[platformio]
src_dir = .

[env:viewe-encoder]
platform = espressif32
board = esp32-s3-devkitc1-n16r8
framework = arduino
build_src_filter = +<main.cpp> +<../include/UltraEncoderPCNT.cpp>
build_flags =
    -I../include
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
upload_speed = 921600
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
