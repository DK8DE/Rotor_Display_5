; PlatformIO – Rotor_Display_5 (ESP32-S3, Arduino, externe Libs wie in der Arduino IDE)
; Hauptskech: src/main.cpp | Arduino IDE: Rotor_Display_5.ino bindet src/main.cpp ein

[platformio]
default_envs = esp32-s3-viewe

[env:esp32-s3-viewe]
; UltraEncoderPCNT liegt unter include/ — explizit mit kompilieren
build_src_filter = +<*> +<../include/UltraEncoderPCNT.cpp>
platform = espressif32
; VIEWE UEDX46460015 (ESP32-S3R8): 16 MB Flash + 8 MB OPI-PSRAM (siehe GitHub README)
; https://github.com/VIEWESMART/UEDX46460015-MD50ESP32-1.5inch-Touch-Knob-Display
board = esp32-s3-devkitc1-n16r8
framework = arduino

; Bibliotheken liegen unter lib/ (Kopie, kein D:/Arduino/libraries mehr) – für GitHub/Offline-Build.
; Enthalten: ESP32_Display_Panel, esp-lib-utils, ESP32_IO_Expander, lvgl, ESP32_Knob, ESP32_Button, Signals, eez-framework (EEZ Flow)

; Wie Arduino: „16M Flash (3MB APP/9.9MB FATFS)“ → partitions.csv (app3M_fat9M_16MB)
; data/ → pio run -t uploadfs schreibt auf die FAT-Partition (ffat)
board_build.filesystem = fatfs
board_build.partitions = partitions.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
upload_speed = 921600

monitor_speed = 115200
; Wichtig bei ESP32-S3 + USB-CDC: Ohne das setzt der Monitor oft RTS/DTR → Reset beim Öffnen,
; USB-OTG verschwindet / nur Bootloader-COM sichtbar.
monitor_rts = 0
monitor_dtr = 0

; ESP32_Display_Panel: Die Vorlage liegt im Library-ROOT, PlatformIO fügt oft nur …/ESP32_Display_Panel/src

build_flags =
    -Iinclude
    -Isrc
    -I.
    -Ilib/eez-framework/src
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLVGL_PORT_DISP_OFFSET_X=5
    -DEEZ_FOR_LVGL=1
    -DLV_LVGL_H_INCLUDE_SIMPLE


